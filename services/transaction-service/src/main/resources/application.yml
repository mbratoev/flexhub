spring:
  application:
    name: transaction-service

  datasource:
    url: jdbc:postgresql://localhost:5432/flexhub?currentSchema=transactions
    username: flexhub
    password: flexhub

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: transactions
        format_sql: false

  flyway:
    enabled: true
    schemas: transactions
    default-schema: transactions
    create-schemas: true
    init-sqls:
      - CREATE SCHEMA IF NOT EXISTS transactions
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      # group-id is overridden per @KafkaListener (one group per saga step).
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.example.flexhub.events"
        spring.json.use.type.headers: false
        # The default value type is set per @KafkaListener via the `properties` attribute.
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs
