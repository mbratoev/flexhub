# CI — runs on every push and every pull_request.
#
# Tasks: Gradle build, all tests (unit + Testcontainers integration), JaCoCo report.
# Testcontainers needs Docker, which is available on ubuntu-latest by default.

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build + test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' }}

      # `check` runs compile + all tests + jacocoTestReport (the latter is wired
      # via `test.finalizedBy(jacocoTestReport)` in the root build.gradle.kts).
      - name: Build + test
        run: ./gradlew check --no-daemon

      - name: Upload JaCoCo HTML reports
        if: always()   # publish even when tests fail — coverage is useful in either case
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-html
          path: |
            services/*/build/reports/jacoco/test/html
            libs/*/build/reports/jacoco/test/html
          if-no-files-found: ignore

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            services/*/build/reports/tests/test
            services/*/build/test-results/test
          if-no-files-found: ignore
