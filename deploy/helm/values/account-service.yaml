# Release-specific values for account-service.
# Install:  helm install account-service deploy/helm/flexhub-service -f deploy/helm/values/account-service.yaml

name: account-service
image:
  repository: flexhub-account-service
port: 8081

config:
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-postgresql:5432/flexhub?currentSchema=accounts"
  SPRING_DATASOURCE_USERNAME: "flexhub"

envFromSecret:
  - name: SPRING_DATASOURCE_PASSWORD
    secretName: postgres-postgresql
    key: password
