{{- if and .Values.azureWorkloadIdentity.enabled .Values.azureWorkloadIdentity.createServiceAccount }}
# Azure Workload Identity ServiceAccount. The annotation tells the
# workload-identity webhook which managed identity to bind to; the federated
# credential in Azure (Terraform `azurerm_federated_identity_credential`)
# trusts AKS's OIDC issuer to mint tokens for THIS subject:
#   system:serviceaccount:<namespace>:<name>
#
# When multiple service releases share the same SA (one SA for all four
# flexhub releases on AKS), this should be created OUTSIDE the chart —
# otherwise the second `helm install` fails on SA ownership conflict. Set
# createServiceAccount: false and create the SA via kubectl manifest in
# deploy/Makefile (target: aks-create-service-account).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.azureWorkloadIdentity.serviceAccountName }}
  labels:
    {{- include "flexhub-service.labels" . | nindent 4 }}
    azure.workload.identity/use: "true"
  annotations:
    azure.workload.identity/client-id: {{ .Values.azureWorkloadIdentity.clientId | quote }}
{{- end }}
